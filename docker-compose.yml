services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  app:
    build: .
    working_dir: /work/app
    ports:
      - "3000:3000"
    volumes:
      - .:/work
      # node_modules はホストと分離
      - node_modules:/work/app/node_modules
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - path: app/.env.local
        required: false
    depends_on:
      - redis
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 3000"

volumes:
  redis_data:
  node_modules:
